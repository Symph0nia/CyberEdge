syntax = "proto3";

package cyberedge.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service CyberEdge {
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
  rpc CreateScope(CreateScopeRequest) returns (Scope);
  rpc GetScope(GetScopeRequest) returns (Scope);
  rpc StartScan(StartScanRequest) returns (Task);
  rpc GetTask(GetTaskRequest) returns (Task);
  rpc WatchTask(WatchTaskRequest) returns (stream TaskEvent);
  rpc CancelTask(CancelTaskRequest) returns (Task);
  rpc CreateSchedule(CreateScheduleRequest) returns (Schedule);
  rpc SearchSchedules(SearchSchedulesRequest) returns (SearchSchedulesResponse);
  rpc SearchAssetChanges(SearchAssetChangesRequest) returns (SearchAssetChangesResponse);
  rpc SearchExposureChanges(SearchExposureChangesRequest) returns (SearchExposureChangesResponse);
  rpc SearchAssets(SearchAssetsRequest) returns (SearchAssetsResponse);
  rpc SearchServices(SearchServicesRequest) returns (SearchServicesResponse);
  rpc SearchCertificates(SearchCertificatesRequest) returns (SearchCertificatesResponse);
  rpc SearchWebsites(SearchWebsitesRequest) returns (SearchWebsitesResponse);
  rpc ReportFinding(ReportFindingRequest) returns (Finding);
  rpc SearchFindings(SearchFindingsRequest) returns (SearchFindingsResponse);
  rpc SearchObservations(SearchObservationsRequest) returns (SearchObservationsResponse);
  rpc GetEvidence(GetEvidenceRequest) returns (Evidence);
  rpc GetTaskReport(GetTaskReportRequest) returns (TaskReport);
  rpc SearchAudit(SearchAuditRequest) returns (SearchAuditResponse);
}

message InvocationContext {
  string request_id = 1;
  string idempotency_key = 2;
  string agent_id = 3;
  string skill_name = 4;
  string skill_version = 5;
}

message ErrorDetail {
  string code = 1;
  bool retryable = 2;
  map<string, string> metadata = 3;
}

message HealthResponse {
  string status = 1;
}

enum TargetKind {
  TARGET_KIND_UNSPECIFIED = 0;
  TARGET_KIND_DOMAIN = 1;
  TARGET_KIND_IP = 2;
  TARGET_KIND_CIDR = 3;
  TARGET_KIND_ORGANIZATION = 4;
}

message ScopeTarget {
  TargetKind kind = 1;
  string value = 2;
}

message Scope {
  string id = 1;
  string name = 2;
  string authorization_ref = 3;
  repeated ScopeTarget targets = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateScopeRequest {
  InvocationContext context = 1;
  string name = 2;
  string authorization_ref = 3;
  repeated ScopeTarget targets = 4;
}

message GetScopeRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_QUEUED = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_COMPLETED = 3;
  TASK_STATE_FAILED = 4;
  TASK_STATE_CANCELED = 5;
}

message Task {
  string id = 1;
  string scope_id = 2;
  string policy_id = 3;
  TaskState state = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  string schedule_id = 7;
}

message StartScanRequest {
  InvocationContext context = 1;
  string scope_id = 2;
  string policy_id = 3;
}

message GetTaskRequest {
  InvocationContext context = 1;
  string task_id = 2;
}

message WatchTaskRequest {
  InvocationContext context = 1;
  string task_id = 2;
  uint64 after_sequence = 3;
}

message CancelTaskRequest {
  InvocationContext context = 1;
  string task_id = 2;
}

message Schedule {
  string id = 1;
  string scope_id = 2;
  string policy_id = 3;
  uint64 interval_seconds = 4;
  bool enabled = 5;
  google.protobuf.Timestamp next_run_at = 6;
  string last_task_id = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateScheduleRequest {
  InvocationContext context = 1;
  string scope_id = 2;
  string policy_id = 3;
  uint64 interval_seconds = 4;
}

message SearchSchedulesRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

message SearchSchedulesResponse { repeated Schedule schedules = 1; }

enum AssetChangeKind {
  ASSET_CHANGE_KIND_UNSPECIFIED = 0;
  ASSET_CHANGE_KIND_APPEARED = 1;
  ASSET_CHANGE_KIND_DISAPPEARED = 2;
}

message AssetChange {
  string id = 1;
  string schedule_id = 2;
  string task_id = 3;
  string asset_id = 4;
  AssetChangeKind kind = 5;
  google.protobuf.Timestamp detected_at = 6;
}

message SearchAssetChangesRequest {
  InvocationContext context = 1;
  string schedule_id = 2;
}

message SearchAssetChangesResponse { repeated AssetChange changes = 1; }

enum ExposureChangeKind {
  EXPOSURE_CHANGE_KIND_UNSPECIFIED = 0;
  EXPOSURE_CHANGE_KIND_APPEARED = 1;
  EXPOSURE_CHANGE_KIND_DISAPPEARED = 2;
  EXPOSURE_CHANGE_KIND_MODIFIED = 3;
}

message ExposureChange {
  string id = 1;
  string schedule_id = 2;
  string task_id = 3;
  string resource_kind = 4;
  string resource_id = 5;
  ExposureChangeKind kind = 6;
  string previous_fingerprint = 7;
  string current_fingerprint = 8;
  google.protobuf.Timestamp detected_at = 9;
}

message SearchExposureChangesRequest {
  InvocationContext context = 1;
  string schedule_id = 2;
}

message SearchExposureChangesResponse { repeated ExposureChange changes = 1; }

message TaskEvent {
  string task_id = 1;
  uint64 sequence = 2;
  string event_type = 3;
  google.protobuf.Timestamp occurred_at = 4;
}

message Asset {
  string id = 1;
  string scope_id = 2;
  TargetKind kind = 3;
  string value = 4;
  google.protobuf.Timestamp first_seen_at = 5;
  google.protobuf.Timestamp last_seen_at = 6;
}

message Service {
  string id = 1;
  string asset_id = 2;
  string transport = 3;
  uint32 port = 4;
  string service_hint = 5;
  google.protobuf.Timestamp first_seen_at = 6;
  google.protobuf.Timestamp last_seen_at = 7;
}

message SearchServicesRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

message SearchServicesResponse { repeated Service services = 1; }

message Certificate {
  string id = 1;
  string service_id = 2;
  string sha256 = 3;
  string subject = 4;
  string issuer = 5;
  repeated string dns_names = 6;
  google.protobuf.Timestamp not_before = 7;
  google.protobuf.Timestamp not_after = 8;
  google.protobuf.Timestamp first_seen_at = 9;
  google.protobuf.Timestamp last_seen_at = 10;
}

message SearchCertificatesRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

message SearchCertificatesResponse { repeated Certificate certificates = 1; }

message Website {
  string id = 1;
  string service_id = 2;
  string url = 3;
  uint32 status_code = 4;
  string title = 5;
  string server = 6;
  string content_type = 7;
  string content_sha256 = 8;
  google.protobuf.Timestamp first_seen_at = 9;
  google.protobuf.Timestamp last_seen_at = 10;
  repeated TechnologyFingerprint fingerprints = 11;
  repeated string discovered_paths = 12;
  string screenshot_evidence_id = 13;
}

message TechnologyFingerprint {
  string id = 1;
  string name = 2;
  string version = 3;
  string detector = 4;
  string rule_id = 5;
  string evidence_id = 6;
  string cpe_name = 7;
  string cpe_source = 8;
}

message SearchWebsitesRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

message SearchWebsitesResponse { repeated Website websites = 1; }

enum FindingSeverity {
  FINDING_SEVERITY_UNSPECIFIED = 0;
  FINDING_SEVERITY_INFO = 1;
  FINDING_SEVERITY_LOW = 2;
  FINDING_SEVERITY_MEDIUM = 3;
  FINDING_SEVERITY_HIGH = 4;
  FINDING_SEVERITY_CRITICAL = 5;
}

enum FindingState {
  FINDING_STATE_UNSPECIFIED = 0;
  FINDING_STATE_OPEN = 1;
  FINDING_STATE_RESOLVED = 2;
}

message Finding {
  string id = 1;
  string scope_id = 2;
  string task_id = 3;
  string asset_id = 4;
  string observation_id = 5;
  string evidence_id = 6;
  string detector = 7;
  string rule_id = 8;
  string title = 9;
  string description = 10;
  FindingSeverity severity = 11;
  FindingState state = 12;
  string fingerprint = 13;
  google.protobuf.Timestamp first_seen_at = 14;
  google.protobuf.Timestamp last_seen_at = 15;
}

message ReportFindingRequest {
  InvocationContext context = 1;
  string task_id = 2;
  string observation_id = 3;
  string detector = 4;
  string rule_id = 5;
  string title = 6;
  string description = 7;
  FindingSeverity severity = 8;
  string fingerprint = 9;
}

message SearchFindingsRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

message SearchFindingsResponse { repeated Finding findings = 1; }

message Observation {
  string id = 1;
  string task_id = 2;
  string asset_id = 3;
  string observation_type = 4;
  string value_json = 5;
  string evidence_id = 6;
  google.protobuf.Timestamp observed_at = 7;
}

message Evidence {
  string id = 1;
  string media_type = 2;
  string sha256 = 3;
  bytes content = 4;
  google.protobuf.Timestamp created_at = 5;
}

message SearchAssetsRequest {
  InvocationContext context = 1;
  string scope_id = 2;
}

message SearchAssetsResponse { repeated Asset assets = 1; }

message SearchObservationsRequest {
  InvocationContext context = 1;
  string task_id = 2;
}

message SearchObservationsResponse { repeated Observation observations = 1; }

message GetEvidenceRequest {
  InvocationContext context = 1;
  string evidence_id = 2;
}

message GetTaskReportRequest {
  InvocationContext context = 1;
  string task_id = 2;
}

message TaskReport {
  Task task = 1;
  Scope scope = 2;
  repeated Asset assets = 3;
  repeated Observation observations = 4;
  repeated Evidence evidence = 5;
  google.protobuf.Timestamp generated_at = 6;
  repeated Service services = 7;
  repeated Certificate certificates = 8;
  repeated Website websites = 9;
  repeated Finding findings = 10;
}

message AuditEvent {
  string id = 1;
  string request_id = 2;
  string operation = 3;
  string agent_id = 4;
  string skill_name = 5;
  string skill_version = 6;
  string resource_kind = 7;
  string resource_id = 8;
  google.protobuf.Timestamp occurred_at = 9;
}

message SearchAuditRequest { InvocationContext context = 1; }
message SearchAuditResponse { repeated AuditEvent events = 1; }
