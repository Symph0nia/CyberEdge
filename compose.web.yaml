services:
  cyberedge:
    environment:
      CYBEREDGE_WEB_BIND: 0.0.0.0:8080
      CYBEREDGE_WEB_DIST: /opt/cyberedge/web
      CYBEREDGE_WEB_OIDC_ISSUER: ${CYBEREDGE_WEB_OIDC_ISSUER:?set OIDC issuer}
      CYBEREDGE_WEB_OIDC_AUDIENCE: ${CYBEREDGE_WEB_OIDC_AUDIENCE:?set OIDC audience}
      CYBEREDGE_WEB_OIDC_JWKS_URL: ${CYBEREDGE_WEB_OIDC_JWKS_URL:?set HTTPS JWKS URL}
      CYBEREDGE_WEB_ROLE_CLAIM: ${CYBEREDGE_WEB_ROLE_CLAIM:-roles}
      CYBEREDGE_WEB_READ_ROLE: ${CYBEREDGE_WEB_READ_ROLE:-cyberedge.read}
      CYBEREDGE_WEB_EVIDENCE_ROLE: ${CYBEREDGE_WEB_EVIDENCE_ROLE:-cyberedge.evidence.read}
    ports:
      - 127.0.0.1:8080:8080
